<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const e = React.createElement;

// ═══════════════════════════════════════════════════════════════
//  SHARED UTILITIES
// ═══════════════════════════════════════════════════════════════
function seededRand(seed){
  let s=seed;
  return ()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646;};
}

// ═══════════════════════════════════════════════════════════════
//  TAB 1 — SIMPLE LINEAR REGRESSION (1 predictor)
// ═══════════════════════════════════════════════════════════════
const PAD={left:52,right:16,top:18,bottom:46};
const PRESETS=[
  {label:"Strong +",trueSlope:0.09, trueB0:20, noise:6, xMin:200,xMax:800,yMin:30,yMax:105,n:35},
  {label:"Weak +",  trueSlope:0.04, trueB0:45, noise:12,xMin:200,xMax:800,yMin:30,yMax:105,n:35},
  {label:"Negative",trueSlope:-0.08,trueB0:110,noise:7, xMin:200,xMax:800,yMin:30,yMax:105,n:35},
  {label:"Scattered",trueSlope:0.05,trueB0:35, noise:20,xMin:200,xMax:800,yMin:30,yMax:105,n:40},
  {label:"Few Pts", trueSlope:0.10, trueB0:15, noise:8, xMin:250,xMax:750,yMin:30,yMax:105,n:12},
];

function genData1(preset,seed){
  const rand=seededRand(seed);const data=[];
  for(let i=0;i<preset.n;i++){
    const x=preset.xMin+rand()*(preset.xMax-preset.xMin);
    let y=preset.trueB0+preset.trueSlope*x+(rand()-0.5)*2*preset.noise;
    y=Math.max(preset.yMin+2,Math.min(preset.yMax-2,y));
    data.push({x:Math.round(x),y:+y.toFixed(2)});
  }
  return data;
}

function stats1(data){
  const n=data.length;
  const xm=data.reduce((s,d)=>s+d.x,0)/n,ym=data.reduce((s,d)=>s+d.y,0)/n;
  const num=data.reduce((s,d)=>s+(d.x-xm)*(d.y-ym),0);
  const den=data.reduce((s,d)=>s+(d.x-xm)**2,0);
  const B1=num/den,B0=ym-B1*xm;
  const sse=data.reduce((s,d)=>s+(d.y-(B0+B1*d.x))**2,0);
  const sst=data.reduce((s,d)=>s+(d.y-ym)**2,0);
  return{n,xm,ym,num,den,B1,B0,r2:1-sse/sst};
}

function toC(x,y,xMin,xMax,yMin,yMax,W,H){
  return{cx:PAD.left+(x-xMin)/(xMax-xMin)*W,cy:PAD.top+(1-(y-yMin)/(yMax-yMin))*H};
}

function makeSteps1(st,preset){
  const{n,xm,ym,num,den,B1,B0,r2}=st;
  const midX=Math.round((preset.xMin+preset.xMax)/2);
  const predMid=(B0+B1*midX).toFixed(1);
  return[
    {id:0,title:"Step 1 \u2014 Plot the Data",color:"#60a5fa",
     what:`Place all ${n} data points on the chart. x-axis = predictor, y-axis = outcome.`,
     why:"Visualising first lets us judge if a linear pattern exists before doing any math. A tight upward cloud \u2192 strong positive relationship.",
     chart:"\ud83d\udc41\ufe0f Watch the dots appear. Guess the trend direction before the line is revealed."},
    {id:1,title:"Step 2 \u2014 Compute x\u0304 and y\u0304",color:"#fbbf24",
     what:`x\u0304 = ${xm.toFixed(2)}\ny\u0304 = ${ym.toFixed(2)}`,
     why:"The OLS line is guaranteed to pass through (\u0304x, \u0304y) \u2014 the centre of gravity of the data. This is our first constraint.",
     chart:"\ud83d\udfe1 Gold dot = mean point. Dashed yellow = x\u0304, dashed green = y\u0304. The line must cross here."},
    {id:2,title:"Step 3 \u2014 Numerator \u03a3(x\u1d62\u2212x\u0304)(y\u1d62\u2212y\u0304)",color:"#fb923c",
     what:`For each point multiply x-deviation by y-deviation.\n\u03a3(x\u1d62\u2212x\u0304)(y\u1d62\u2212y\u0304) = ${num.toFixed(1)}\n${num>0?"Positive \u2192 positive slope":num<0?"Negative \u2192 negative slope":"~0 \u2192 no relationship"}`,
     why:"Same-direction deviations add to the slope signal. Opposite-direction deviations cancel it. This is the covariance of x and y.",
     chart:"\ud83d\udfe0 Yellow = \u0394x from mean, Orange = \u0394y from mean. Same direction \u2192 positive contribution."},
    {id:3,title:"Step 4 \u2014 Denominator \u03a3(x\u1d62\u2212x\u0304)\u00b2",color:"#a78bfa",
     what:`Square each x-deviation (always positive).\n\u03a3(x\u1d62\u2212x\u0304)\u00b2 = ${den.toFixed(1)}`,
     why:"Normalises the slope into y-units per x-unit. Wide x-spread \u2192 large denominator \u2192 more stable estimate.",
     chart:"\ud83d\udfe3 Purple bars = horizontal distance from x\u0304. Longer bars = more x-spread = more reliable b\u2081."},
    {id:4,title:"Step 5 \u2014 Calculate b\u2081 (slope)",color:"#34d399",
     what:`b\u2081 = ${num.toFixed(1)} / ${den.toFixed(1)} = ${B1.toFixed(4)}\n\nEvery +1 in x \u2192 y ${B1>0?"increases":"decreases"} by ${Math.abs(B1).toFixed(4)}`,
     why:"b\u2081 is the tilt of the line. Large |b\u2081| \u2192 strong influence. Near zero \u2192 x barely predicts y.",
     chart:"\ud83d\udfe2 Line rotates around \u03bc until it locks onto b\u2081 = "+B1.toFixed(4)+"."},
    {id:5,title:"Step 6 \u2014 Calculate b\u2080 (intercept)",color:"#f472b6",
     what:`b\u2080 = y\u0304 \u2212 b\u2081\u00b7x\u0304\n= ${ym.toFixed(2)} \u2212 ${B1.toFixed(4)} \u00d7 ${xm.toFixed(2)}\n= ${B0.toFixed(4)}`,
     why:"Anchors the line vertically. Plug the mean point into y = b\u2080 + b\u2081x and solve for b\u2080.",
     chart:"\ud83d\udd35 Line draws through mean point. Both coefficients solved."},
    {id:6,title:"Step 7 \u2014 Regression Line \u2713",color:"#60a5fa",
     what:`y = ${B0.toFixed(2)} + ${B1.toFixed(4)}\u00b7x\n\nAt x=${midX}: y\u0302 = ${predMid}\nR\u00b2 = ${r2.toFixed(3)} (${(r2*100).toFixed(1)}% variance explained)`,
     why:"This line minimises SSE \u2014 total squared residuals. No other line does better. R\u00b2 tells you how much of y's variation x explains.",
     chart:"\ud83d\udd34 Red lines = residuals (actual \u2212 predicted). "+( r2>0.8?"Tight fit \u2014 short residuals.":r2>0.5?"Moderate fit.":"High scatter \u2014 x alone isn't enough.")+"\nHit Randomize to try a new dataset."},
  ];
}

function Chart1({data,st,step,prog,preset}){
  const ref=useRef(null);
  const{xm,ym,num,B1,B0}=st;
  const{xMin,xMax,yMin,yMax}=preset;
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const CW=canvas.width,CH=canvas.height;
    const W=CW-PAD.left-PAD.right,H=CH-PAD.top-PAD.bottom;
    const tc=(x,y)=>toC(x,y,xMin,xMax,yMin,yMax,W,H);
    ctx.clearRect(0,0,CW,CH);ctx.fillStyle='#0d1117';ctx.fillRect(0,0,CW,CH);
    const xStep=(xMax-xMin)/6;
    for(let gx=xMin;gx<=xMax+1;gx+=xStep){
      const{cx}=tc(gx,0);
      ctx.beginPath();ctx.moveTo(cx,PAD.top);ctx.lineTo(cx,PAD.top+H);
      ctx.strokeStyle='#1e2330';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#4b5563';ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText(Math.round(gx),cx,PAD.top+H+15);
    }
    const yStep=Math.ceil((yMax-yMin)/7/5)*5;
    for(let gy=Math.ceil(yMin/yStep)*yStep;gy<=yMax;gy+=yStep){
      const{cy}=tc(0,gy);
      ctx.beginPath();ctx.moveTo(PAD.left,cy);ctx.lineTo(PAD.left+W,cy);
      ctx.strokeStyle='#1e2330';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#4b5563';ctx.font='10px monospace';ctx.textAlign='right';
      ctx.fillText(gy,PAD.left-5,cy+4);
    }
    ctx.strokeStyle='#374151';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(PAD.left,PAD.top);ctx.lineTo(PAD.left,PAD.top+H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(PAD.left,PAD.top+H);ctx.lineTo(PAD.left+W,PAD.top+H);ctx.stroke();
    ctx.fillStyle='#6b7280';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText('x',PAD.left+W/2,CH-3);
    ctx.save();ctx.translate(11,PAD.top+H/2);ctx.rotate(-Math.PI/2);ctx.fillText('y',0,0);ctx.restore();
    if(step>=1){
      const a=step===1?Math.min(prog*2,1):1;
      ctx.globalAlpha=a*0.55;ctx.setLineDash([5,5]);
      const mx1=tc(xm,yMin),mx2=tc(xm,yMax);
      ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(mx1.cx,mx1.cy);ctx.lineTo(mx2.cx,mx2.cy);ctx.stroke();
      const my1=tc(xMin,ym),my2=tc(xMax,ym);
      ctx.strokeStyle='#34d399';
      ctx.beginPath();ctx.moveTo(my1.cx,my1.cy);ctx.lineTo(my2.cx,my2.cy);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;
    }
    if(step===2){
      const count=Math.ceil(prog*Math.min(10,data.length));
      for(let i=0;i<count;i++){
        const d=data[i],pp=tc(d.x,d.y),pm=tc(xm,ym);
        ctx.globalAlpha=0.65;
        ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(pm.cx,pm.cy);ctx.lineTo(pp.cx,pm.cy);ctx.stroke();
        ctx.strokeStyle='#fb923c';
        ctx.beginPath();ctx.moveTo(pp.cx,pm.cy);ctx.lineTo(pp.cx,pp.cy);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
    if(step===3){
      const count=Math.ceil(prog*Math.min(10,data.length));
      for(let i=0;i<count;i++){
        const d=data[i],pp=tc(d.x,d.y),pm=tc(xm,d.y);
        ctx.globalAlpha=0.65;ctx.strokeStyle='#a78bfa';ctx.lineWidth=2.5;
        ctx.beginPath();ctx.moveTo(pm.cx,pm.cy);ctx.lineTo(pp.cx,pp.cy);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }
    if(step===4&&prog>0.2){
      const p=(prog-0.2)/0.8,tb1=B1*p,tb0=ym-tb1*xm;
      const p1=tc(xMin,tb0+tb1*xMin),p2=tc(xMax,tb0+tb1*xMax);
      ctx.globalAlpha=0.6;ctx.strokeStyle='#34d399';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(p1.cx,p1.cy);ctx.lineTo(p2.cx,p2.cy);ctx.stroke();
      ctx.globalAlpha=1;
    }
    if(step===6){
      data.forEach(d=>{
        const yp=B0+B1*d.x,pp=tc(d.x,d.y),pr=tc(d.x,yp);
        ctx.globalAlpha=0.38;ctx.strokeStyle='#f87171';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(pp.cx,pp.cy);ctx.lineTo(pr.cx,pr.cy);ctx.stroke();
        ctx.globalAlpha=1;
      });
    }
    const ptCount=step===0?Math.ceil(prog*data.length):data.length;
    for(let i=0;i<ptCount;i++){
      const d=data[i],{cx,cy}=tc(d.x,d.y);
      ctx.beginPath();ctx.arc(cx,cy,4.5,0,Math.PI*2);
      ctx.fillStyle='#3b82f6';
      ctx.globalAlpha=step===0&&i>=ptCount-3?0.4+0.5*(prog%1):0.8;
      ctx.fill();ctx.globalAlpha=1;
    }
    if(step>=1){
      const mp=tc(xm,ym),a=step===1?Math.min(prog*2,1):1;
      ctx.globalAlpha=a;
      ctx.beginPath();ctx.arc(mp.cx,mp.cy,8,0,Math.PI*2);
      ctx.fillStyle='#fbbf24';ctx.fill();
      ctx.fillStyle='#111';ctx.font='bold 10px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('\u03bc',mp.cx,mp.cy);ctx.textBaseline='alphabetic';
      ctx.globalAlpha=1;
    }
    if(step>=5){
      const lp=step===5?Math.min(prog*2,1):step===6?prog:1;
      const x2=xMin+(xMax-xMin)*lp,p1=tc(xMin,B0+B1*xMin),p2=tc(x2,B0+B1*x2);
      ctx.strokeStyle='#60a5fa';ctx.lineWidth=3;
      ctx.shadowColor='#60a5fa55';ctx.shadowBlur=10;
      ctx.beginPath();ctx.moveTo(p1.cx,p1.cy);ctx.lineTo(p2.cx,p2.cy);ctx.stroke();
      ctx.shadowBlur=0;
    }
  },[data,st,step,prog,preset]);
  return e('canvas',{ref,width:490,height:330,style:{borderRadius:12,border:'1px solid #1e2330',display:'block'}});
}

// ═══════════════════════════════════════════════════════════════
//  TAB 2 — MULTIPLE LINEAR REGRESSION (2 predictors, 3D plane)
// ═══════════════════════════════════════════════════════════════
const PRESETS3D=[
  {label:"Both Strong", b0:20, b1:0.08, b2:0.12, noise:5,  n:60},
  {label:"One Weak",    b0:30, b1:0.09, b2:0.02, noise:7,  n:60},
  {label:"Opposing",    b0:90, b1:0.07, b2:-0.10,noise:6,  n:60},
  {label:"High Noise",  b0:25, b1:0.06, b2:0.09, noise:18, n:60},
  {label:"Few Pts",     b0:20, b1:0.08, b2:0.10, noise:8,  n:18},
];

function genData3D(preset,seed){
  const rand=seededRand(seed);const data=[];
  for(let i=0;i<preset.n;i++){
    const x1=200+rand()*600,x2=200+rand()*600;
    let y=preset.b0+preset.b1*x1+preset.b2*x2+(rand()-0.5)*2*preset.noise;
    y=Math.max(30,Math.min(105,y));
    data.push({x1:+x1.toFixed(1),x2:+x2.toFixed(1),y:+y.toFixed(2)});
  }
  return data;
}

function stats3D(data){
  const n=data.length;
  const x1m=data.reduce((s,d)=>s+d.x1,0)/n;
  const x2m=data.reduce((s,d)=>s+d.x2,0)/n;
  const ym=data.reduce((s,d)=>s+d.y,0)/n;
  // OLS via 2x2 normal equations
  let S11=0,S12=0,S22=0,Sy1=0,Sy2=0;
  data.forEach(d=>{
    const dx1=d.x1-x1m,dx2=d.x2-x2m,dy=d.y-ym;
    S11+=dx1*dx1;S12+=dx1*dx2;S22+=dx2*dx2;Sy1+=dx1*dy;Sy2+=dx2*dy;
  });
  const det=S11*S22-S12*S12;
  const b1=(S22*Sy1-S12*Sy2)/det;
  const b2=(S11*Sy2-S12*Sy1)/det;
  const b0=ym-b1*x1m-b2*x2m;
  const sse=data.reduce((s,d)=>s+(d.y-(b0+b1*d.x1+b2*d.x2))**2,0);
  const sst=data.reduce((s,d)=>s+(d.y-ym)**2,0);
  return{n,x1m,x2m,ym,b0,b1,b2,r2:1-sse/sst};
}

// 3D projection helpers
function project3D(x,y,z,rotX,rotY,scale,ox,oy){
  // Rotate around Y axis then X axis
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  let rx=x*cosY+z*sinY;
  let ry=y;
  let rz=-x*sinY+z*cosY;
  let ry2=ry*cosX-rz*sinX;
  let rz2=ry*sinX+rz*cosX;
  const fov=800;
  const pz=fov+rz2;
  const px=ox+(rx*fov/pz)*scale;
  const py=oy-(ry2*fov/pz)*scale;
  return{px,py,depth:rz2};
}

const STEPS3D=[
  {id:0,title:"Step 1 \u2014 3D Scatter Plot",color:"#60a5fa",
   what:"With two predictors x\u2081 and x\u2082, each observation becomes a point in 3D space: (x\u2081, x\u2082, y). The chart is now a cube, not a flat plane.",
   why:"We need 3D because we have 3 variables. The relationship we're modelling is no longer a line \u2014 it's a flat plane cutting through this cloud of dots.",
   chart:"\ud83d\udc41\ufe0f The 3D cube rotates so you can see the point cloud from all angles. Drag to rotate manually. Notice the data lives in a volume, not a flat surface."},
  {id:1,title:"Step 2 \u2014 Compute the Means",color:"#fbbf24",
   what:"We need three means now:\n  x\u0304\u2081 = mean of all x\u2081 values\n  x\u0304\u2082 = mean of all x\u2082 values\n  y\u0304 = mean of all y values",
   why:"Just like 2D, the regression plane is guaranteed to pass through the centroid point (x\u0304\u2081, x\u0304\u2082, y\u0304). This is the 3D centre of mass of the data.",
   chart:"\ud83d\udfe1 The gold dot marks the centroid. The plane will pass through exactly this point no matter what."},
  {id:2,title:"Step 3 \u2014 Build the Normal Equations",color:"#fb923c",
   what:"With 2 predictors we solve a 2\u00d72 system:\n  [S\u2081\u2081  S\u2081\u2082] [b\u2081]   [Sy\u2081]\n  [S\u2081\u2082  S\u2082\u2082] [b\u2082] = [Sy\u2082]\n\nWhere S\u2081\u2081=\u03a3(x\u2081\u1d62\u2212x\u0304\u2081)\u00b2, S\u2082\u2082=\u03a3(x\u2082\u1d62\u2212x\u0304\u2082)\u00b2\nS\u2081\u2082=\u03a3(x\u2081\u1d62\u2212x\u0304\u2081)(x\u2082\u1d62\u2212x\u0304\u2082)",
   why:"In simple regression b\u2081 = Sy\u2081/S\u2081\u2081 was trivial. With 2 predictors, the slopes interact \u2014 we must solve them simultaneously because x\u2081 and x\u2082 may be correlated with each other.",
   chart:"\ud83d\udfe0 Think of it as two forces pulling the plane. The system finds the tilt along BOTH axes at once, accounting for how x\u2081 and x\u2082 are related."},
  {id:3,title:"Step 4 \u2014 Solve for b\u2081 and b\u2082",color:"#34d399",

   why:"b\u2081 is the slope along x\u2081 holding x\u2082 constant. b\u2082 is the slope along x\u2082 holding x\u2081 constant. These are partial slopes \u2014 they each control for the other predictor.",

   why:"The plane is the 3D equivalent of the 2D line. It's the unique flat surface that minimises SSE. R\u00b2 still measures the fraction of variance in y explained by x\u2081 and x\u2082 together.",

function Chart3D({data,st,step,prog,rotX,rotY}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const CW=canvas.width,CH=canvas.height;
    ctx.clearRect(0,0,CW,CH);
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,CW,CH);

    const{x1m,x2m,ym,b0,b1,b2}=st;
    const ox=CW/2,oy=CH/2;
    const scale=0.9;
    // Map data to [-1,1] cube coords
    const norm=(v,mn,mx)=>(v-mn)/(mx-mn)*2-1;
    const x1Min=200,x1Max=800,x2Min=200,x2Max=800,yMin=30,yMax=105;

    function pt(x1,x2,y){
      const nx=norm(x1,x1Min,x1Max);
      const nz=norm(x2,x2Min,x2Max);
      const ny=norm(y,yMin,yMax);
      return project3D(nx*120,ny*100,nz*120,rotX,rotY,scale,ox,oy);
    }

    // Draw cube wireframe
    const corners3D=[
      [x1Min,yMin,x2Min],[x1Max,yMin,x2Min],[x1Max,yMax,x2Min],[x1Min,yMax,x2Min],
      [x1Min,yMin,x2Max],[x1Max,yMin,x2Max],[x1Max,yMax,x2Max],[x1Min,yMax,x2Max],
    ];
    const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    ctx.strokeStyle='#1e2330';ctx.lineWidth=1;
    edges.forEach(([a,b])=>{
      const[ax1,ay,ax2]=corners3D[a],[bx1,by,bx2]=corners3D[b];
      const pa=pt(ax1,ax2,ay),pb=pt(bx1,bx2,by);
      ctx.beginPath();ctx.moveTo(pa.px,pa.py);ctx.lineTo(pb.px,pb.py);ctx.stroke();
    });

    // Axis labels
    const axLabels=[
      {pos:[x1Max+30,yMin,x2Min],label:'x\u2081',color:'#60a5fa'},
      {pos:[x1Min,yMin,x2Max+30],label:'x\u2082',color:'#34d399'},
      {pos:[x1Min,yMax+10,x2Min],label:'y',color:'#f472b6'},
    ];
    axLabels.forEach(({pos,label,color})=>{
      const p=pt(pos[0],pos[2],pos[1]);
      ctx.fillStyle=color;ctx.font='bold 13px monospace';ctx.textAlign='center';
      ctx.fillText(label,p.px,p.py);
    });

    // Regression plane (step 3+)
    const showPlane=step>=3;
    const planeProg=step===3?Math.min((prog-0.1)/0.9,1):step===4?Math.min(prog*2,1):step>=5?prog:1;
    if(showPlane&&planeProg>0){
      // Interpolate towards final b1,b2
      const tb1=b1*planeProg,tb2=b2*planeProg;
      const tb0=ym-tb1*x1m-tb2*x2m;
      // Build plane grid
      const grid=12;
      const tris=[];
      for(let i=0;i<grid;i++){
        for(let j=0;j<grid;j++){
          const fx1=x1Min+(x1Max-x1Min)*i/grid;
          const fx1b=x1Min+(x1Max-x1Min)*(i+1)/grid;
          const fx2=x2Min+(x2Max-x2Min)*j/grid;
          const fx2b=x2Min+(x2Max-x2Min)*(j+1)/grid;
          const fy00=Math.max(yMin,Math.min(yMax,tb0+tb1*fx1+tb2*fx2));
          const fy10=Math.max(yMin,Math.min(yMax,tb0+tb1*fx1b+tb2*fx2));
          const fy01=Math.max(yMin,Math.min(yMax,tb0+tb1*fx1+tb2*fx2b));
          const fy11=Math.max(yMin,Math.min(yMax,tb0+tb1*fx1b+tb2*fx2b));
          const p00=pt(fx1,fx2,fy00),p10=pt(fx1b,fx2,fy10);
          const p01=pt(fx1,fx2b,fy01),p11=pt(fx1b,fx2b,fy11);
          const depth=(p00.depth+p10.depth+p01.depth+p11.depth)/4;
          tris.push({p00,p10,p01,p11,depth});
        }
      }
      // Sort back to front
      tris.sort((a,b)=>a.depth-b.depth);
      tris.forEach(({p00,p10,p01,p11})=>{
        ctx.globalAlpha=0.18;
        ctx.fillStyle='#3b82f6';
        ctx.beginPath();
        ctx.moveTo(p00.px,p00.py);ctx.lineTo(p10.px,p10.py);
        ctx.lineTo(p11.px,p11.py);ctx.lineTo(p01.px,p01.py);
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=0.25;
        ctx.strokeStyle='#60a5fa';ctx.lineWidth=0.3;ctx.stroke();
        ctx.globalAlpha=1;
      });
    }

    // Residual lines (step 5)
    if(step>=5){
      const lp=step===5?prog:1;
      const count=Math.ceil(lp*data.length);
      for(let i=0;i<count;i++){
        const d=data[i];
        const yp=Math.max(yMin,Math.min(yMax,b0+b1*d.x1+b2*d.x2));
        const pp=pt(d.x1,d.x2,d.y),pr=pt(d.x1,d.x2,yp);
        ctx.globalAlpha=0.45;ctx.strokeStyle='#f87171';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(pp.px,pp.py);ctx.lineTo(pr.px,pr.py);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    // Mean centroid (step 1+)
    if(step>=1){
      const mp=pt(x1m,x2m,ym);
      const a=step===1?Math.min(prog*2,1):1;
      ctx.globalAlpha=a;
      ctx.beginPath();ctx.arc(mp.px,mp.py,8,0,Math.PI*2);
      ctx.fillStyle='#fbbf24';ctx.fill();
      ctx.fillStyle='#111';ctx.font='bold 10px monospace';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('\u03bc',mp.px,mp.py);ctx.textBaseline='alphabetic';
      ctx.globalAlpha=1;
    }

    // Data points
    const ptCount=step===0?Math.ceil(prog*data.length):data.length;
    // Sort by depth for correct occlusion
    const pts=data.slice(0,ptCount).map((d,i)=>{
      const p=pt(d.x1,d.x2,d.y);
      return{...p,i};
    });
    pts.sort((a,b)=>a.depth-b.depth);
    pts.forEach(({px,py,i})=>{
      ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);
      ctx.fillStyle='#3b82f6';
      ctx.globalAlpha=step===0&&i>=ptCount-3?0.4+0.5*(prog%1):0.85;
      ctx.fill();ctx.globalAlpha=1;
    });

  },[data,st,step,prog,rotX,rotY]);
  return e('canvas',{ref,width:490,height:370,
    style:{borderRadius:12,border:'1px solid #1e2330',display:'block',cursor:'grab'}});
}

// ═══════════════════════════════════════════════════════════════
function Tab1(){
  const [presetIdx,setPresetIdx]=useState(0);
  const [seed,setSeed]=useState(42);
  const [step,setStep]=useState(-1);
  const [prog,setProg]=useState(0);
  const [running,setRunning]=useState(false);
  const [paused,setPaused]=useState(false);
  const animRef=useRef(null);const startRef=useRef(null);
  const pausedProgRef=useRef(0);const pausedStepRef=useRef(-1);
  const STEP_DUR=2000;
  const preset=PRESETS[presetIdx];
  const data=useMemo(()=>genData1(preset,seed),[preset,seed]);
  const st=useMemo(()=>stats1(data),[data]);
  const steps=useMemo(()=>makeSteps1(st,preset),[st,preset]);
  const{xm,ym,num,den,B1,B0,r2}=st;

  const runStep=useCallback((s,stepsArr,startProg=0)=>{
    if(s>=stepsArr.length){setRunning(false);setPaused(false);return;}
    setStep(s);setProg(startProg);startRef.current=null;
    if(animRef.current)cancelAnimationFrame(animRef.current);
    const alreadyElapsed=startProg*STEP_DUR;
    function frame(ts){
      if(!startRef.current)startRef.current=ts-alreadyElapsed;
      const p=Math.min((ts-startRef.current)/STEP_DUR,1);
      setProg(p);pausedProgRef.current=p;pausedStepRef.current=s;
      if(p<1)animRef.current=requestAnimationFrame(frame);
      else setTimeout(()=>runStep(s+1,stepsArr,0),400);
    }
    animRef.current=requestAnimationFrame(frame);
  },[]);

  function start(){setRunning(true);setPaused(false);runStep(0,steps,0);}
  function pause(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setPaused(true);setRunning(false);
  }
  function resume(){
    setRunning(true);setPaused(false);
    runStep(pausedStepRef.current,steps,pausedProgRef.current);
  }
  function randomize(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setSeed(Math.floor(Math.random()*999999));
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }
  function reset(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }
  function switchPreset(idx){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setPresetIdx(idx);setSeed(Math.floor(Math.random()*999999));
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }
  const curStep=steps[step];
  const done=step===steps.length-1&&prog>=1;
  const r2Color=r2>0.8?'#34d399':r2>0.5?'#fbbf24':'#f87171';

  return e('div',null,
    // Presets
    e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      PRESETS.map((p,i)=>e('button',{key:i,onClick:()=>switchPreset(i),
        className:'tab-btn'+(i===presetIdx?' active':'')},p.label))
    ),
    e('div',{style:{display:'flex',gap:14,alignItems:'flex-start',flexWrap:'wrap'}},
      // Left
      e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        e(Chart1,{data,st,step,prog,preset}),
        // Progress
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:8,padding:'10px 12px'}},
          e('div',{style:{display:'flex',gap:4,marginBottom:6}},
            steps.map((s,i)=>e('div',{key:i,
              onClick:()=>{if(!running){setStep(i);setProg(1);}},
              style:{flex:1,height:4,borderRadius:2,cursor:'pointer',
                background:i<step?'#3b82f6':i===step?s.color:'#1e2330',transition:'background 0.3s'}}))
          ),
          e('div',{style:{fontSize:'0.67rem',color:'#6b7280'}},
            step<0?'Press Start':done?`Complete \u2713  (R\u00b2=${r2.toFixed(3)})`:
            paused?`\u23f8 Paused at Step ${step+1}/${steps.length} \u2014 ${curStep?.title}`:
            `Step ${step+1}/${steps.length} \u2014 ${curStep?.title}`)
        ),
        // Buttons
        e('div',{style:{display:'flex',gap:8}},
          !running&&!paused&&!done?
            e('button',{onClick:start,style:{flex:1,padding:'9px',background:'#1d4ed8',
              color:'white',border:'none',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              step<0?'\u25b6 Start Animation':'\u25b6 Restart'):null,
          running?
            e('button',{onClick:pause,style:{flex:1,padding:'9px',background:'#92400e',
              color:'#fbbf24',border:'1px solid #b45309',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              '\u23f8 Pause'):null,
          paused?e('div',{style:{flex:1,display:'flex',gap:6}},
            e('button',{onClick:resume,style:{flex:1,padding:'9px',background:'#14532d',
              color:'#34d399',border:'1px solid #166534',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              '\u25b6 Resume'),
            e('button',{onClick:reset,style:{padding:'9px 12px',background:'#131620',color:'#6b7280',
              border:'1px solid #1e2330',borderRadius:8,fontSize:'0.76rem'}},'\u21ba Reset')
          ):null,
          done?e('button',{onClick:reset,style:{flex:1,padding:'9px',background:'#131620',
            color:'#34d399',border:'1px solid #166534',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
            '\u21ba Restart'):null,
          e('button',{onClick:randomize,disabled:running,style:{flex:1,padding:'9px',
            background:running?'#131620':'#064e3b',color:running?'#374151':'#34d399',
            border:`1px solid ${running?'#1e2330':'#065f46'}`,borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
            '\ud83c\udfb2 Randomize'),
          !paused&&!done?e('button',{onClick:reset,disabled:running&&!paused,
            style:{padding:'9px 14px',background:'#131620',color:running?'#272a36':'#6b7280',
              border:'1px solid #1e2330',borderRadius:8,fontSize:'0.9rem'}},'\u21ba'):null
        )
      ),
      // Right
      e('div',{style:{flex:1,minWidth:270,display:'flex',flexDirection:'column',gap:10}},
        e('div',{style:{background:'#0d1117',border:`1px solid ${curStep?curStep.color+'55':'#1e2330'}`,
          borderRadius:10,padding:'14px 16px',minHeight:260,transition:'border-color 0.4s'}},
          e('div',{style:{fontSize:'0.8rem',fontWeight:'bold',color:curStep?curStep.color:'#374151',
            marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${curStep?curStep.color+'33':'#1e2330'}`}},
            curStep?curStep.title:'Waiting\u2026'),
          curStep?e('div',null,
            e(Section,{label:'What we compute',color:curStep.color},curStep.what),
            e(Section,{label:'Why this matters',color:'#94a3b8'},curStep.why),
            e('div',{style:{background:'#0a0d17',borderRadius:6,padding:'8px 10px'}},
              e('div',{style:{fontSize:'0.6rem',fontWeight:'bold',textTransform:'uppercase',
                letterSpacing:'0.12em',color:'#374151',marginBottom:3}},'On the chart'),
              e('div',{style:{fontSize:'0.7rem',color:'#6ee7b7',lineHeight:1.75}},curStep.chart)
            )
          ):e('div',{style:{fontSize:'0.72rem',color:'#374151',lineHeight:1.9,marginTop:6}},
            'Select a preset above, then press Start.\nEach step explains what\u2019s computed, why it matters, and what you see on the chart.')
        ),
        // Values
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:10,padding:'12px 14px'}},
          e('div',{style:{fontSize:'0.62rem',color:'#374151',textTransform:'uppercase',
            letterSpacing:'0.1em',marginBottom:8}},'Computed Values'),
          [
            {label:'x\u0304',val:step>=1?xm.toFixed(2):'--',color:'#fbbf24'},
            {label:'y\u0304',val:step>=1?ym.toFixed(2):'--',color:'#34d399'},
            {label:'\u03a3(x\u2212x\u0304)(y\u2212y\u0304)',val:step>=2?num.toFixed(1):'--',color:'#fb923c'},
            {label:'\u03a3(x\u2212x\u0304)\u00b2',val:step>=3?den.toFixed(1):'--',color:'#a78bfa'},
            {label:'b\u2081 (slope)',val:step>=4?B1.toFixed(4):'--',color:'#34d399'},
            {label:'b\u2080 (intercept)',val:step>=5?B0.toFixed(4):'--',color:'#f472b6'},
            {label:'R\u00b2',val:step>=6?r2.toFixed(3):'--',color:r2Color},
          ].map(({label,val,color})=>e('div',{key:label,
            style:{display:'flex',justifyContent:'space-between',fontSize:'0.7rem',
              padding:'4px 0',borderBottom:'1px solid #111520'}},
            e('span',{style:{color:'#4b5563'}},label),
            e('span',{style:{color:val==='--'?'#1e2330':color,fontWeight:'bold',fontFamily:'monospace'}},val)
          ))
        ),
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:10,
          padding:'10px 14px',textAlign:'center'}},
          e('div',{style:{fontSize:'0.62rem',color:'#374151',textTransform:'uppercase',
            letterSpacing:'0.1em',marginBottom:6}},'Model'),
          e('div',{style:{fontSize:'0.88rem',fontWeight:'bold',fontFamily:'monospace',
            color:step>=5?'#93c5fd':'#1e2330'}},
            step>=5?`y = ${B0.toFixed(2)} + ${B1.toFixed(4)}\u00b7x`:'y = b\u2080 + b\u2081\u00b7x'),
          step>=6?e('div',{style:{fontSize:'0.68rem',color:r2Color,marginTop:4}},
            `R\u00b2=${r2.toFixed(3)} \u2014 ${r2>0.8?'strong \ud83d\udcaa':r2>0.5?'moderate \ud83d\udc4d':'weak \ud83d\ude05'}`):null
        )
      )
    )
  );
}

//  TAB 2 COMPONENT
// ═══════════════════════════════════════════════════════════════
function Tab2(){
  const [presetIdx,setPresetIdx]=useState(0);
  const [seed,setSeed]=useState(77);
  const [step,setStep]=useState(-1);
  const [prog,setProg]=useState(0);
  const [running,setRunning]=useState(false);
  const [paused,setPaused]=useState(false);
  const [rotX,setRotX]=useState(0.42);
  const [rotY,setRotY]=useState(0.55);
  const dragRef=useRef(null);
  const animRef=useRef(null);const startRef=useRef(null);
  const pausedProgRef=useRef(0);const pausedStepRef=useRef(-1);
  const autoRotRef=useRef(null);
  const [autoRot,setAutoRot]=useState(true);
  const rotYRef=useRef(0.55);
  const STEP_DUR=2200;

  const preset=PRESETS3D[presetIdx];
  const data=useMemo(()=>genData3D(preset,seed),[preset,seed]);
  const st=useMemo(()=>stats3D(data),[data]);
  const{x1m,x2m,ym,b0,b1,b2,r2}=st;
  const r2Color=r2>0.8?'#34d399':r2>0.5?'#fbbf24':'#f87171';

  // Auto-rotate
  useEffect(()=>{
    if(autoRot){
      autoRotRef.current=setInterval(()=>{
        rotYRef.current+=0.008;
        setRotY(rotYRef.current);
      },30);
    }else{
      clearInterval(autoRotRef.current);
    }
    return()=>clearInterval(autoRotRef.current);
  },[autoRot]);

  // Drag to rotate
  function onMouseDown(ev){
    setAutoRot(false);
    const startX=ev.clientX,startY=ev.clientY;
    const startRotY=rotY,startRotX=rotX;
    function onMove(e){
      setRotY(startRotY+(e.clientX-startX)*0.01);
      setRotX(Math.max(-0.8,Math.min(0.8,startRotX-(e.clientY-startY)*0.01)));
      rotYRef.current=startRotY+(e.clientX-startX)*0.01;
    }
    function onUp(){window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  }

  const runStep=useCallback((s,startProg=0)=>{
    if(s>=STEPS3D.length){setRunning(false);setPaused(false);return;}
    setStep(s);setProg(startProg);startRef.current=null;
    if(animRef.current)cancelAnimationFrame(animRef.current);
    const alreadyElapsed=startProg*STEP_DUR;
    function frame(ts){
      if(!startRef.current)startRef.current=ts-alreadyElapsed;
      const p=Math.min((ts-startRef.current)/STEP_DUR,1);
      setProg(p);pausedProgRef.current=p;pausedStepRef.current=s;
      if(p<1)animRef.current=requestAnimationFrame(frame);
      else setTimeout(()=>runStep(s+1,0),500);
    }
    animRef.current=requestAnimationFrame(frame);
  },[]);

  function start(){setRunning(true);setPaused(false);runStep(0,0);}
  function pause(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setPaused(true);setRunning(false);
  }
  function resume(){
    setRunning(true);setPaused(false);
    runStep(pausedStepRef.current,pausedProgRef.current);
  }
  function randomize(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setSeed(Math.floor(Math.random()*999999));
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }
  function reset(){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }
  function switchPreset(idx){
    if(animRef.current)cancelAnimationFrame(animRef.current);
    setPresetIdx(idx);setSeed(Math.floor(Math.random()*999999));
    setStep(-1);setProg(0);setRunning(false);setPaused(false);
  }

  const curStep=STEPS3D[step];
  const done=step===STEPS3D.length-1&&prog>=1;

  // Fill in stats into step text dynamically
  function fillStep(s){
    if(!s)return s;
    const filled={...s};
    if(s.id===1){
      filled.what=`We need three means now:\n  x\u0304\u2081 = ${x1m.toFixed(2)}\n  x\u0304\u2082 = ${x2m.toFixed(2)}\n  y\u0304 = ${ym.toFixed(2)}`;
    }
    if(s.id===3){
      filled.what=`Cramer's rule:\n  b\u2081 = ${b1.toFixed(4)}\n  b\u2082 = ${b2.toFixed(4)}\n\nSigns: b\u2081 ${b1>0?"> 0 (positive effect)":"< 0 (negative effect)"}, b\u2082 ${b2>0?"> 0 (positive effect)":"< 0 (negative effect)"}`;
    }
    if(s.id===4){
      filled.what=`b\u2080 = y\u0304 \u2212 b\u2081\u00b7x\u0304\u2081 \u2212 b\u2082\u00b7x\u0304\u2082\nb\u2080 = ${ym.toFixed(2)} \u2212 ${b1.toFixed(4)}\u00d7${x1m.toFixed(1)} \u2212 ${b2.toFixed(4)}\u00d7${x2m.toFixed(1)}\nb\u2080 = ${b0.toFixed(4)}`;
    }
    if(s.id===5){
      const ex1=500,ex2=500;
      const pred=(b0+b1*ex1+b2*ex2).toFixed(1);
      filled.what=`y\u0302 = ${b0.toFixed(2)} + ${b1.toFixed(4)}\u00b7x\u2081 + ${b2.toFixed(4)}\u00b7x\u2082\n\nExample (x\u2081=500, x\u2082=500):\n  y\u0302 = ${pred}\n\nR\u00b2 = ${r2.toFixed(3)} (${(r2*100).toFixed(1)}% variance explained)`;
      filled.chart=`\ud83d\udd34 Red lines = residuals from each point to the plane surface. ${r2>0.8?'Tight fit \u2014 the plane passes close to most points.':r2>0.5?'Moderate fit \u2014 visible scatter above/below the plane.':'High scatter \u2014 the plane is still optimal, but x\u2081 and x\u2082 together don\u2019t fully explain y.'} Drag to rotate!`;
    }
    return filled;
  }
  const displayStep=fillStep(curStep);

  return e('div',null,
    // Presets
    e('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      PRESETS3D.map((p,i)=>e('button',{key:i,onClick:()=>switchPreset(i),
        className:'tab-btn'+(i===presetIdx?' active':'')},p.label))
    ),
    e('div',{style:{display:'flex',gap:14,alignItems:'flex-start',flexWrap:'wrap'}},
      // Left: 3D chart
      e('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        e('div',{style:{position:'relative'}},
          e('div',{onMouseDown,style:{cursor:'grab'}},
            e(Chart3D,{data,st,step,prog,rotX,rotY})
          ),
          e('div',{style:{position:'absolute',top:8,right:10,display:'flex',gap:6}},
            e('button',{onClick:()=>setAutoRot(r=>!r),
              style:{padding:'4px 10px',fontSize:'0.65rem',background:'#131620',
                color:autoRot?'#34d399':'#4b5563',border:'1px solid #1e2330',borderRadius:6}},
              autoRot?'\u23f8 Pause Rotation':'\u25b6 Auto-Rotate'),
            e('span',{style:{fontSize:'0.62rem',color:'#374151',alignSelf:'center'}},
              '\u2190\u2192 drag to rotate')
          )
        ),
        // Progress bar
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:8,padding:'10px 12px'}},
          e('div',{style:{display:'flex',gap:4,marginBottom:6}},
            STEPS3D.map((s,i)=>e('div',{key:i,
              onClick:()=>{if(!running){setStep(i);setProg(1);}},
              style:{flex:1,height:4,borderRadius:2,cursor:'pointer',
                background:i<step?'#3b82f6':i===step?s.color:'#1e2330',transition:'background 0.3s'}}))
          ),
          e('div',{style:{fontSize:'0.67rem',color:'#6b7280'}},
            step<0?'Press Start \u2014 you can drag the 3D chart to rotate it':
            done?`Complete \u2713  (R\u00b2=${r2.toFixed(3)})`:
            paused?`\u23f8 Paused at Step ${step+1}/${STEPS3D.length} \u2014 ${curStep?.title}`:
            `Step ${step+1}/${STEPS3D.length} \u2014 ${curStep?.title}`)
        ),
        // Buttons
        e('div',{style:{display:'flex',gap:8}},
          !running&&!paused&&!done?
            e('button',{onClick:start,style:{flex:1,padding:'9px',background:'#1d4ed8',
              color:'white',border:'none',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              step<0?'\u25b6 Start Animation':'\u25b6 Restart'):null,
          running?
            e('button',{onClick:pause,style:{flex:1,padding:'9px',background:'#92400e',
              color:'#fbbf24',border:'1px solid #b45309',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              '\u23f8 Pause'):null,
          paused?e('div',{style:{flex:1,display:'flex',gap:6}},
            e('button',{onClick:resume,style:{flex:1,padding:'9px',background:'#14532d',
              color:'#34d399',border:'1px solid #166534',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
              '\u25b6 Resume'),
            e('button',{onClick:reset,style:{padding:'9px 12px',background:'#131620',color:'#6b7280',
              border:'1px solid #1e2330',borderRadius:8,fontSize:'0.76rem'}},'\u21ba Reset')
          ):null,
          done?e('button',{onClick:reset,style:{flex:1,padding:'9px',background:'#131620',
            color:'#34d399',border:'1px solid #166534',borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
            '\u21ba Restart'):null,
          e('button',{onClick:randomize,disabled:running,style:{flex:1,padding:'9px',
            background:running?'#131620':'#064e3b',color:running?'#374151':'#34d399',
            border:`1px solid ${running?'#1e2330':'#065f46'}`,borderRadius:8,fontSize:'0.76rem',fontWeight:'bold'}},
            '\ud83c\udfb2 Randomize'),
          !paused&&!done?e('button',{onClick:reset,disabled:running&&!paused,
            style:{padding:'9px 14px',background:'#131620',color:running?'#272a36':'#6b7280',
              border:'1px solid #1e2330',borderRadius:8,fontSize:'0.9rem'}},'\u21ba'):null
        )
      ),
      // Right panel
      e('div',{style:{flex:1,minWidth:270,display:'flex',flexDirection:'column',gap:10}},
        e('div',{style:{background:'#0d1117',border:`1px solid ${displayStep?displayStep.color+'55':'#1e2330'}`,
          borderRadius:10,padding:'14px 16px',minHeight:260,transition:'border-color 0.4s'}},
          e('div',{style:{fontSize:'0.8rem',fontWeight:'bold',
            color:displayStep?displayStep.color:'#374151',
            marginBottom:10,paddingBottom:8,
            borderBottom:`1px solid ${displayStep?displayStep.color+'33':'#1e2330'}`}},
            displayStep?displayStep.title:'Waiting\u2026'),
          displayStep?e('div',null,
            e(Section,{label:'What we compute',color:displayStep.color},displayStep.what),
            e(Section,{label:'Why this matters',color:'#94a3b8'},displayStep.why),
            e('div',{style:{background:'#0a0d17',borderRadius:6,padding:'8px 10px'}},
              e('div',{style:{fontSize:'0.6rem',fontWeight:'bold',textTransform:'uppercase',
                letterSpacing:'0.12em',color:'#374151',marginBottom:3}},'On the chart'),
              e('div',{style:{fontSize:'0.7rem',color:'#6ee7b7',lineHeight:1.75}},displayStep.chart)
            )
          ):e('div',{style:{fontSize:'0.72rem',color:'#374151',lineHeight:1.9,marginTop:6}},
            'With 2 predictors, the regression surface becomes a PLANE in 3D space instead of a line.\n\nDrag the chart to rotate it before pressing Start.\nEach step shows the 2-predictor math and how it appears on the 3D chart.')
        ),
        // Values
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:10,padding:'12px 14px'}},
          e('div',{style:{fontSize:'0.62rem',color:'#374151',textTransform:'uppercase',
            letterSpacing:'0.1em',marginBottom:8}},'Computed Values'),
          [
            {label:'x\u0304\u2081',val:step>=1?x1m.toFixed(2):'--',color:'#fbbf24'},
            {label:'x\u0304\u2082',val:step>=1?x2m.toFixed(2):'--',color:'#fbbf24'},
            {label:'y\u0304',val:step>=1?ym.toFixed(2):'--',color:'#34d399'},
            {label:'b\u2081 (slope x\u2081)',val:step>=3?b1.toFixed(4):'--',color:'#34d399'},
            {label:'b\u2082 (slope x\u2082)',val:step>=3?b2.toFixed(4):'--',color:'#60a5fa'},
            {label:'b\u2080 (intercept)',val:step>=4?b0.toFixed(4):'--',color:'#f472b6'},
            {label:'R\u00b2',val:step>=5?r2.toFixed(3):'--',color:r2Color},
          ].map(({label,val,color})=>e('div',{key:label,
            style:{display:'flex',justifyContent:'space-between',fontSize:'0.7rem',
              padding:'4px 0',borderBottom:'1px solid #111520'}},
            e('span',{style:{color:'#4b5563'}},label),
            e('span',{style:{color:val==='--'?'#1e2330':color,fontWeight:'bold',fontFamily:'monospace'}},val)
          ))
        ),
        // Equation
        e('div',{style:{background:'#0d1117',border:'1px solid #1e2330',borderRadius:10,
          padding:'10px 14px',textAlign:'center'}},
          e('div',{style:{fontSize:'0.62rem',color:'#374151',textTransform:'uppercase',
            letterSpacing:'0.1em',marginBottom:6}},'Model'),
          e('div',{style:{fontSize:'0.82rem',fontWeight:'bold',fontFamily:'monospace',
            color:step>=4?'#93c5fd':'#1e2330',lineHeight:1.7}},
            step>=4?`y = ${b0.toFixed(2)}\n+ ${b1.toFixed(4)}\u00b7x\u2081\n+ ${b2.toFixed(4)}\u00b7x\u2082`:
            'y = b\u2080 + b\u2081\u00b7x\u2081 + b\u2082\u00b7x\u2082'),
          step>=5?e('div',{style:{fontSize:'0.68rem',color:r2Color,marginTop:4}},
            `R\u00b2=${r2.toFixed(3)} \u2014 ${r2>0.8?'strong \ud83d\udcaa':r2>0.5?'moderate \ud83d\udc4d':'weak \ud83d\ude05'}`):null
        ),
        // Comparison note
        e('div',{style:{background:'#0a0d17',border:'1px solid #1e2330',borderRadius:8,
          padding:'10px 12px',fontSize:'0.68rem',color:'#4b5563',lineHeight:1.7}},
          e('span',{style:{color:'#60a5fa'}},'2D vs 3D: '),
          '1 predictor \u2192 best-fit LINE. 2 predictors \u2192 best-fit PLANE. n predictors \u2192 hyperplane (same math, impossible to visualise).'
        )
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════
//  CLAUDE CHAT SIDEBAR
// ═══════════════════════════════════════════════════════════════
const OPENAI_API_KEY = 'YOUR_API_KEY_HERE'; // ← paste your key here

const SYSTEM_PROMPT = `You are a friendly, knowledgeable math tutor embedded inside an interactive linear regression demo. You help users with a wide range of mathematical topics.

STATISTICS & REGRESSION (the demo's main focus)
- Simple/multiple linear regression, OLS, SSE, R², residuals, normal equations
- Probability: distributions (normal, binomial, geometric, Poisson, exponential), Bayes theorem, conditional probability
- Hypothesis testing, p-values, confidence intervals, t-tests, ANOVA
- Descriptive stats: mean, median, variance, std deviation, skewness, correlation, covariance
- Markov chains and stochastic processes

LINEAR ALGEBRA
- Vectors, dot/cross product, vector spaces, projections, orthogonality
- Matrices: multiplication, inverse, determinant, rank, transpose
- Eigenvalues/eigenvectors, diagonalisation, SVD (conceptual)
- Systems of equations, Gaussian elimination, Gram-Schmidt

CALCULUS & ANALYSIS
- Limits, continuity, derivatives (all rules, implicit, logarithmic differentiation)
- Integrals: definite/indefinite, substitution, by parts, partial fractions
- Multivariable calculus: partial derivatives, gradient, Jacobian, Hessian, optimisation
- Taylor/Maclaurin series, L'Hôpital's rule
- ODEs: separable, first-order linear, second-order with characteristic equations

DISCRETE MATH & COMBINATORICS
- Permutations, combinations, binomial theorem, counting principles
- Set theory, logic, proof techniques (induction, contradiction, direct proof)
- Graph theory basics, recurrence relations, modular arithmetic

SIGNAL PROCESSING & APPLIED MATH
- Fourier series, DFT, IDFT, spectral leakage, windowing
- FIR/IIR filters, frequency response, convolution, Nyquist/sampling theorem
- Z-transform, transfer functions

GENERAL MATH
- Algebra: solving equations, polynomials, factoring, partial fractions, logarithms/exponents
- Trigonometry: unit circle, identities, inverse trig, solving triangles
- Complex numbers: polar/Euler form, De Moivre's theorem, operations
- Number theory: primes, GCD/LCM, modular arithmetic, Euclidean algorithm

Rules:
- Be concise but thorough. Show step-by-step working when solving specific problems — do not just give the answer.
- Use clean mathematical notation in plain text: x², √x, Σ, ∫, ∂, π, e, ∞, →, ≈, ≠, ≤, ≥, etc.
- When relevant, connect the topic to the demo (e.g. eigenvalues → why OLS normal equations always have a solution; Fourier → frequency domain ideas).
- If a question is completely outside mathematics (history, politics, cooking, etc.), politely say you are a math tutor and redirect.
- Never fabricate formulas. If genuinely unsure, say so clearly and suggest where to verify.
- Adapt your language to the level of the question — plain language for basics, technical precision for advanced topics.`;

const SUGGESTED_QUESTIONS = [
  "Why does the regression line always pass through (x̄, ȳ)?",
  "What does R² actually mean?",
  "Explain eigenvalues in simple terms",
  "What is the difference between a derivative and an integral?",
  "How does the Fourier transform work?",
  "What is Bayes' theorem and when do I use it?",
  "Explain matrix multiplication step by step",
  "What are p-values and why are they controversial?",
];

function ChatSidebar() {
  const [messages, setMessages] = useState([
    {role:'ai', text:'Hi! 👋 I\'m your math tutor. I can help with statistics, linear algebra, calculus, probability, signal processing, and more — not just the regression demo.\n\nAsk me anything, or pick a topic below to get started.'}
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({behavior:'smooth'});
  }, [messages]);

  async function sendMessage(text) {
    const userText = text || input.trim();
    if (!userText || loading) return;
    setInput('');

    const newMessages = [...messages, {role:'user', text:userText}];
    setMessages([...newMessages, {role:'ai', text:'...', thinking:true}]);
    setLoading(true);

    // Build history for API (exclude the thinking placeholder)
    const history = newMessages
      .filter(m => m.role === 'user' || (m.role === 'ai' && !m.thinking))
      .map(m => ({role: m.role === 'ai' ? 'assistant' : 'user', content: m.text}));

    try {
      const resp = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENAI_API_KEY}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o',
          max_tokens: 1024,
          messages: [
            {role: 'system', content: SYSTEM_PROMPT},
            ...history,
          ],
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      const reply = data.choices?.[0]?.message?.content || 'No response.';
      setMessages(prev => [...prev.slice(0,-1), {role:'ai', text:reply}]);
    } catch(err) {
      setMessages(prev => [...prev.slice(0,-1), {role:'error', text:`Error: ${err.message}`}]);
    } finally {
      setLoading(false);
    }
  }

  function onKeyDown(ev) {
    if (ev.key === 'Enter' && !ev.shiftKey) {
      ev.preventDefault();
      sendMessage();
    }
  }

  const showSuggestions = messages.length <= 1;

  return e('div', {className:'chat-sidebar'},
    // Header
    e('div', {style:{padding:'12px 14px', borderBottom:'1px solid #1e2330', flexShrink:0}},
      e('div', {style:{display:'flex', alignItems:'center', gap:8, marginBottom:2}},
        e('div', {style:{width:8, height:8, borderRadius:'50%', background:'#34d399',
          boxShadow:'0 0 6px #34d39988'}}),
        e('span', {style:{fontSize:'0.78rem', fontWeight:'bold', color:'#93c5fd',
          letterSpacing:'0.05em'}}, 'Ask the Tutor'),
      ),
      e('p', {style:{fontSize:'0.62rem', color:'#374151'}},
        'GPT-4o \u2014 Math Tutor')
    ),

    // Messages
    e('div', {className:'chat-messages'},
      messages.map((msg, i) =>
        e('div', {key:i,
          className: msg.role==='user' ? 'msg-user' :
                     msg.role==='error' ? 'msg-error' :
                     msg.thinking ? 'msg-ai thinking' : 'msg-ai'},
          msg.thinking ?
            e('span', null,
              e('span', {style:{display:'inline-block', animation:'none'}}, '● '),
              'Thinking…'
            ) : msg.text
        )
      ),
      // Suggested questions (only when chat is fresh)
      showSuggestions ? e('div', {style:{display:'flex', flexDirection:'column', gap:5, marginTop:4}},
        e('div', {style:{fontSize:'0.6rem', color:'#374151', textTransform:'uppercase',
          letterSpacing:'0.1em', marginBottom:2}}, 'Quick questions'),
        SUGGESTED_QUESTIONS.map((q,i) =>
          e('button', {key:i, className:'suggested-q', onClick:()=>sendMessage(q)}, q)
        )
      ) : null,
      e('div', {ref:bottomRef})
    ),

    // Input
    e('div', {className:'chat-input-row'},
      e('textarea', {
        ref: textareaRef,
        className: 'chat-input',
        value: input,
        onChange: ev => setInput(ev.target.value),
        onKeyDown,
        placeholder: 'Ask about linear regression…',
        rows: 2,
        disabled: loading,
      }),
      e('button', {
        className: 'chat-send',
        onClick: () => sendMessage(),
        disabled: loading || !input.trim(),
      }, loading ? '…' : '↑')
    )
  );
}

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState(0);
  return e('div',{style:{background:'#080b12',minHeight:'100vh',padding:'16px'}},
    e('div',{style:{maxWidth:1380,margin:'0 auto',display:'flex',gap:16,alignItems:'flex-start'}},
      // Main content
      e('div',{style:{flex:1,minWidth:0}},
        // Header
        e('div',{style:{marginBottom:16}},
          e('h1',{style:{fontSize:'1.05rem',color:'#93c5fd',letterSpacing:'0.06em',
            textTransform:'uppercase',marginBottom:4}},
            '\ud83d\udcc8 Linear Regression \u2014 Interactive Demo'),
          e('p',{style:{fontSize:'0.68rem',color:'#374151',marginBottom:12}},
            'Ordinary Least Squares \u2014 1 predictor (line) \u2194 2 predictors (plane)'),
          e('div',{style:{display:'flex',gap:8}},
            e('button',{onClick:()=>setTab(0),className:'tab-btn'+(tab===0?' active':'')},
              '\ud83d\udcc9 Simple Regression (2D)'),
            e('button',{onClick:()=>setTab(1),className:'tab-btn'+(tab===1?' active':'')},
              '\ud83d\udcca Multiple Regression (3D Plane)')
          )
        ),
        // Tab content
        tab===0?e(Tab1):e(Tab2)
      ),
      // Chat sidebar — always visible on the right
      e(ChatSidebar)
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
